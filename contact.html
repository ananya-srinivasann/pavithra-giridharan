<div class="contact-top">
<div class="Giridharan-title">
    <h1>Contact</h1>
</div>
<img src="scroll.png" alt="img">
</div>

<div class="illustrations-note">
    <h2>Reach out with any questions or inquiries!</h2>
    <p>Email address: creativistus@gmail.com</p>
</div>

<div class="contact-container">
    <form class="custom-form" action="mailto:creativistus@gmail.com" method="post" enctype="text/plain">
        <div class="form-group">
            <label for="name">Name (First and Last)</label>
            <input type="text" id="name" name="Name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="Email" required>
        </div>
        
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" name="Body"></textarea>
        </div>
        
        <div class="red-button">
            <button type="submit">Submit</button>
        </div>
    </form>
</div>

</body>
